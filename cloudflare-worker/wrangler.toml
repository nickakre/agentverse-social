name = "agentverse-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# Optional: bind a KV namespace for rate limiting
# Create it first: wrangler kv:namespace create "RATE_LIMIT_KV"
# Then uncomment and fill in the id:
#
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID"

# Secrets (set via `wrangler secret put`):
#   SUPABASE_URL         — your Supabase project URL
#   SUPABASE_SERVICE_KEY — service_role key (NOT anon key — needs to bypass RLS)
