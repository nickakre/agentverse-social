name: Agent Health Check

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:   # also allow manual trigger from GitHub Actions tab

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run Agent Health Check
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.error, datetime

          SUPABASE_URL = os.environ.get("SUPABASE_URL", "")
          SERVICE_KEY  = os.environ.get("SUPABASE_SERVICE_KEY", "")

          if not SUPABASE_URL or not SERVICE_KEY:
              print("⚠️  Supabase env vars not set — skipping health check.")
              print("   Add SUPABASE_SERVICE_KEY to your GitHub Secrets.")
              exit(0)

          HEADERS = {
              "apikey": SERVICE_KEY,
              "Authorization": f"Bearer {SERVICE_KEY}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal",
          }

          # ── Fetch all agents that have an endpoint URL ───────────────────
          url = f"{SUPABASE_URL}/rest/v1/agents?select=id,name,status,endpoint_url&limit=500"
          req = urllib.request.Request(url, headers=HEADERS)
          with urllib.request.urlopen(req) as r:
              agents = json.loads(r.read())

          print(f"Found {len(agents)} agents to check.")

          # Agents without an endpoint_url are skipped (browser-registered agents
          # don't expose a pingable URL — only programmatic API agents do)
          checkable = [a for a in agents if a.get("endpoint_url")]
          print(f"  {len(checkable)} have endpoint_url, {len(agents)-len(checkable)} skipped.")

          # ── Ping each endpoint ───────────────────────────────────────────
          # An agent is considered "live" if it responds HTTP 200 within 5s.
          updates = []  # (id, new_status)

          for agent in checkable:
              endpoint = agent["endpoint_url"]
              alive = False
              try:
                  probe = urllib.request.Request(
                      endpoint,
                      headers={"User-Agent": "AgentVerse-HealthCheck/2.0"},
                  )
                  with urllib.request.urlopen(probe, timeout=5) as resp:
                      alive = (resp.status == 200)
              except Exception as e:
                  print(f"  ✗ {agent['name']} ({endpoint}) — {type(e).__name__}")

              desired = "active" if alive else "offline"
              if desired != agent["status"]:
                  updates.append((agent["id"], agent["name"], desired))
                  icon = "✓" if alive else "✗"
                  print(f"  {icon} {agent['name']}: {agent['status']} → {desired}")
              else:
                  print(f"  · {agent['name']}: {agent['status']} (no change)")

          # ── Apply status updates ─────────────────────────────────────────
          for agent_id, agent_name, new_status in updates:
              patch_url = f"{SUPABASE_URL}/rest/v1/agents?id=eq.{agent_id}"
              body = json.dumps({"status": new_status}).encode()
              patch_req = urllib.request.Request(patch_url, data=body, headers={**HEADERS, "Prefer": "return=minimal"}, method="PATCH")
              with urllib.request.urlopen(patch_req) as r:
                  pass  # 204 No Content is success

              # Log as an interaction so it shows in the activity feed
              interaction_url = f"{SUPABASE_URL}/rest/v1/interactions"
              log_body = json.dumps({
                  "agent_id": agent_id,
                  "agent_name": agent_name,
                  "type": "status_update",
                  "payload": {"status": new_status, "source": "health_check"},
              }).encode()
              log_req = urllib.request.Request(interaction_url, data=log_body, headers=HEADERS, method="POST")
              with urllib.request.urlopen(log_req) as r:
                  pass

          # ── Summary ─────────────────────────────────────────────────────
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          went_offline = [n for _, n, s in updates if s == "offline"]
          came_online  = [n for _, n, s in updates if s == "active"]

          print(f"\n── Health Check Complete ({now}) ──")
          print(f"  Checked:      {len(checkable)}")
          print(f"  Went offline: {len(went_offline)}" + (f" — {', '.join(went_offline)}" if went_offline else ""))
          print(f"  Came online:  {len(came_online)}"  + (f" — {', '.join(came_online)}"  if came_online  else ""))
          print(f"  No change:    {len(checkable) - len(updates)}")
          PYEOF

      - name: Summary
        if: always()
        run: echo "Health check workflow complete."
